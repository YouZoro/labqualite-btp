plugins {
    id 'com.android.application'
}

android {
    namespace 'com.labqualite.btp'
    compileSdk 34
    buildToolsVersion "34.0.0"

    defaultConfig {
        applicationId "com.labqualite.btp"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
        }
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    // Package web assets into the APK
    sourceSets {
        main {
            assets.srcDirs = ['src/main/assets']
        }
    }
}
