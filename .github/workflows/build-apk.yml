name: Build LabQualité BTP APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Copy web files to Android assets
        run: |
          mkdir -p android/app/src/main/assets
          cp index.html android/app/src/main/assets/
          cp styles.css android/app/src/main/assets/
          cp app.js android/app/src/main/assets/
          cp logo_btp.png android/app/src/main/assets/
          cp manifest.json android/app/src/main/assets/

      - name: Prepare app icon from logo
        run: |
          sudo apt-get install -y imagemagick
          # Create mipmap directories for all densities
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          # Resize logo for each density
          convert logo_btp.png -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert logo_btp.png -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert logo_btp.png -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert logo_btp.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert logo_btp.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          # Also copy to drawable as fallback
          convert logo_btp.png -resize 192x192 android/app/src/main/res/drawable/ic_launcher.png

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.5

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LabQualite-BTP-v1.0.0
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
